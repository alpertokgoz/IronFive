name: IronFive
options:
  bundleIdPrefix: com.antigravity
targets:
  IronFive:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.antigravity.IronFive
        INFOPLIST_KEY_CFBundleDisplayName: IronFive
        INFOPLIST_KEY_UISupportedInterfaceOrientations:
          [UIInterfaceOrientationPortrait]
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: 5.0
        DEVELOPMENT_TEAM: ""
        INFOPLIST_KEY_NSHealthUpdateUsageDescription: IronFive needs permission to log your workouts to Apple Health.
        INFOPLIST_KEY_NSHealthShareUsageDescription: IronFive needs permission to read your heart rate and active energy during workouts.
        INFOPLIST_KEY_WKRunsIndependentlyOfCompanionApp: true
        INFOPLIST_KEY_WKApplication: true
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.antigravity
        INFOPLIST_KEY_UIBackgroundModes: [workout-processing]
        CODE_SIGN_ENTITLEMENTS: Sources/IronFive.entitlements
        TARGETED_DEVICE_FAMILY: 4
        SDKROOT: watchos
schemes:
  IronFive:
    shared: true
    build:
      targets:
        IronFive: [all]
    run:
      config: Debug
    archive:
      config: Release
