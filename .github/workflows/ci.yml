name: IronFive CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Install Dependencies
        run: |
          brew install xcodegen swiftlint xcbeautify
          xcodegen generate

      - name: Run SwiftLint
        run: swiftlint lint --reporter github-actions-logging

      - name: Build
        run: |
          set -o pipefail
          xcodebuild clean build \
            -project IronFive.xcodeproj \
            -scheme IronFive \
            -destination 'generic/platform=watchOS Simulator' \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO \
            2>&1 | tee build.log | xcbeautify --renderer github-actions

      - name: Report Errors and Warnings
        if: always()
        run: |
          echo "## Build Errors" >> $GITHUB_STEP_SUMMARY
          grep -E "error:|warning:" build.log \
            | grep -v "^note:" \
            | grep -v "ld: warning:" \
            | sort | uniq \
            >> $GITHUB_STEP_SUMMARY || echo "No errors or warnings found." >> $GITHUB_STEP_SUMMARY
